name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.24.3"

jobs:
  gitleaks:
    name: Gitleaks scan (working tree)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITLEAKS_VERSION}"
          url="https://github.com/zricethezav/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "${url}" -o "${tmp}/gitleaks.tar.gz"
          tar -xzf "${tmp}/gitleaks.tar.gz" -C "${tmp}"
          sudo mv "${tmp}/gitleaks" /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree (no-git)
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect --source . --no-git --redact --verbose --exit-code 1

      - name: Scan full git history
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect --source . --redact --verbose --exit-code 1
